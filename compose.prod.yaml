# compose.prod.yaml
#
# Producción: NO construye nada. Referencia las imágenes ya publicadas en GHCR.
# Reemplaza czapata2020 por tu usuario u organización de GitHub (en minúsculas).
# El tag se elige al desplegar:  TAG=sha-a1b2c3d  o  TAG=v1.4.2  (default: latest)

services:
  vault:
    image: ghcr.io/czapata2020/gastos-familiares-vault:${TAG:-latest}
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/openbao/data     # datos persistentes: NO borrar en redeploy
      - vault-tokens:/vault-tokens
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  db:
    image: ghcr.io/czapata2020/gastos-familiares-db:${TAG:-latest}
    ports:
      - "3001:3001"
    volumes:
      - db-data:/data                # base SQLite persistente: NO borrar en redeploy
      - vault-tokens:/vault-tokens
    environment:
      - DB_PATH=/data/gastos.db
      - PORT=3001
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN_FILE=/vault-tokens/app.token
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  app:
    image: ghcr.io/czapata2020/gastos-familiares-app:${TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      - DB_URL=http://db:3001
    # SIN volumes de código / node_modules / .next: la imagen 'runner' es autocontenida
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  vault-data:
  vault-tokens:
