# .github/workflows/build-and-push.yml
#
# Construye y publica en GHCR las TRES imágenes propias del proyecto:
#   - app   (Next.js, target 'runner' de producción)
#   - db    (API Node + better-sqlite3)
#   - vault (OpenBao con tu config/entrypoint)
#
# Se dispara en cada push a main y en cada tag vX.Y.Z.
# El servidor NUNCA construye: solo hace pull de estas imágenes.

name: Build and Push Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            context: .
            dockerfile: ./Dockerfile
            target: runner          # <<< solo la app usa multi-stage; este es el stage de prod
          - name: db
            context: ./db
            dockerfile: ./db/Dockerfile
            target: ''
          - name: vault
            context: ./vault
            dockerfile: ./vault/Dockerfile
            target: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token automatico; no creas secrets

      - name: Tags y labels (${{ matrix.name }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/gastos-familiares-<app|db|vault>
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/gastos-familiares-${{ matrix.name }}
          tags: |
            type=sha,format=short                               # sha-a1b2c3d (inmutable)
            type=ref,event=tag                                  # v1.4.2 (si pusheaste un tag)
            type=raw,value=latest,enable={{is_default_branch}}  # latest solo en main

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}     # vacio para db/vault, 'runner' para app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
