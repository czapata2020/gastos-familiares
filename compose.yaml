services:
  vault:
    build:
      context: ./vault
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/openbao/data
      - vault-tokens:/vault-tokens
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  db:
    build:
      context: ./db
    ports:
      - "3001:3001"
    volumes:
      - db-data:/data
      - vault-tokens:/vault-tokens
    environment:
      - DB_PATH=/data/gastos.db
      - PORT=3001
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN_FILE=/vault-tokens/app.token
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - DB_URL=http://db:3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  vault-data:
  vault-tokens:
