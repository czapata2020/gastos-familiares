services:
  vault:
    build:
      context: ./vault
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/openbao/data
      - vault-tokens:/vault-tokens
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  db:
    build:
      context: ./db
    ports:
      - "3001:3001"
    volumes:
      - db-data:/data
      - vault-tokens:/vault-tokens
    environment:
      - DB_PATH=/data/gastos.db
      - PORT=3001
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN_FILE=/vault-tokens/app.token
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    environment:
      - DB_URL=http://db:3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: docker.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o}
      - WAHA_BASE_URL=http://waha:3000
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - DB_BFF_URL=http://app:3000
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
    restart: unless-stopped

  waha:
    image: docker.io/devlikeapro/waha:latest
    ports:
      - "3010:3000"
    volumes:
      - waha_data:/app/.sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=${WAHA_ENGINE:-WEBJS}
      - WAHA_DASHBOARD_ENABLED=true
    restart: unless-stopped

volumes:
  db-data:
  vault-data:
  vault-tokens:
  app_node_modules:
  app_next:
  n8n_data:
  waha_data:
